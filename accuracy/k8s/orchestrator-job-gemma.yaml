# Submit with: kubectl apply -f accuracy/k8s/orchestrator-job-gemma.yaml
# Monitor with: kubectl logs -f job/vllm-mem-orchestrator-gemma -n llmdplanner
apiVersion: batch/v1
kind: Job
metadata:
  name: vllm-mem-orchestrator-gemma
  namespace: llmdplanner
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 28800    # 8-hour cap for 6-model run
  template:
    spec:
      serviceAccountName: vllm-mem-orchestrator
      restartPolicy: Never
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vllm-mem-data
        - name: scripts
          configMap:
            name: vllm-mem-scripts
            defaultMode: 0755
        - name: sweep
          configMap:
            name: vllm-mem-sweep-gemma
      containers:
        - name: orchestrator
          image: python:3.11-slim
          command: ["/bin/bash", "-c"]
          args:
            - |
              pip install pyyaml kubernetes --quiet --no-cache-dir &&
              python /scripts/sweep_runner.py \
                --config /sweep/sweep-gemma.yaml \
                --results /data/results/
          volumeMounts:
            - name: data
              mountPath: /data
            - name: scripts
              mountPath: /scripts
            - name: sweep
              mountPath: /sweep
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
